<html lang="en">
<head>

  <script>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — DataLens</title>
  <meta name="description" content="Articles on data analysis, business intelligence, SQL, AML, banking, and analytics careers by Gyanendu Sharma." />

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #fafaf8;
      --bg-card: #ffffff;
      --bg-surface: #f3f2ee;
      --bg-accent: #eceae3;
      --text-primary: #1a1917;
      --text-secondary: #6b6860;
      --text-tertiary: #a09e99;
      --border: rgba(26,25,23,0.1);
      --border-strong: rgba(26,25,23,0.2);
      --accent: #185FA5;
      --accent-light: #E6F1FB;
      --accent-text: #0C447C;
      --ff-display: 'DM Serif Display', serif;
      --ff-body: 'DM Sans', sans-serif;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--text-primary); font-size: 15px; line-height: 1.6; min-height: 100vh; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px;
    }
    .nav-logo { font-family: var(--ff-display); font-size: 20px; color: var(--text-primary); text-decoration: none; letter-spacing: -0.01em; }
    .nav-logo span { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .nav-tag { font-size: 11px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--text-tertiary); }
    .nav-btn { font-size: 13px; font-weight: 500; color: var(--accent); background: transparent; border: 0.5px solid var(--accent); padding: 5px 14px; border-radius: 999px; cursor: pointer; font-family: var(--ff-body); text-decoration: none; transition: background 0.15s; }
    .nav-btn:hover { background: var(--accent-light); }

    /* HERO */
    .hero { max-width: 860px; margin: 0 auto; padding: 5rem 2rem 3rem; }
    .hero-eyebrow { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; letter-spacing: 0.09em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; }
    .hero-eyebrow::before { content: ''; display: block; width: 20px; height: 1px; background: var(--accent); }
    .hero h1 { font-family: var(--ff-display); font-size: clamp(36px, 6vw, 52px); font-weight: 400; line-height: 1.08; letter-spacing: -0.02em; color: var(--text-primary); margin-bottom: 1.25rem; }
    .hero h1 em { font-style: italic; color: var(--accent); }
    .hero-sub { font-size: 16px; color: var(--text-secondary); max-width: 520px; line-height: 1.65; }

    /* FILTER TABS */
    .filter-section { max-width: 860px; margin: 0 auto; padding: 0 2rem 2rem; }
    .filter-wrap { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 2rem; }
    .filter-btn { display: inline-flex; align-items: center; padding: 6px 14px; border-radius: 999px; border: 0.5px solid var(--border-strong); background: var(--bg-card); color: var(--text-secondary); font-family: var(--ff-body); font-size: 12px; font-weight: 400; cursor: pointer; transition: all 0.18s ease; }
    .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); background: var(--bg-surface); }
    .filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* BLOG GRID */
    .blog-section { max-width: 860px; margin: 0 auto; padding: 0 2rem 4rem; }
    .blog-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }

    .post-card {
      background: var(--bg-card); border: 0.5px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      display: flex; flex-direction: column; gap: 10px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
    }
    .post-card:hover { background: var(--bg-surface); }
    .post-card.open { border-color: var(--accent); }
    .post-card.hidden { display: none; }

    .post-meta { display: flex; align-items: center; justify-content: space-between; }
    .post-tag { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 999px; background: var(--bg-surface); color: var(--text-secondary); }
    .post-date { font-size: 11px; color: var(--text-tertiary); }
    .post-title { font-size: 14px; font-weight: 500; color: var(--text-primary); line-height: 1.4; }
    .post-excerpt { font-size: 12px; color: var(--text-secondary); line-height: 1.55; }
    .post-body { display: none; border-top: 0.5px solid var(--border); padding-top: 12px; margin-top: 4px; }
    .post-body.visible { display: block; animation: fadeSlide 0.2s ease; }
    .post-body p { font-size: 13px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; }
    .post-body p:last-child { margin-bottom: 0; }
    .post-body h4 { font-size: 13px; font-weight: 500; color: var(--text-primary); margin: 12px 0 6px; }
    .post-body ul { padding-left: 1.2rem; }
    .post-body ul li { font-size: 13px; color: var(--text-secondary); line-height: 1.6; margin-bottom: 4px; }
    .read-more { font-size: 12px; color: var(--accent); font-weight: 500; margin-top: auto; }

    @keyframes fadeSlide { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    /* FOOTER */
    footer { max-width: 860px; margin: 0 auto; padding: 2rem 2rem 3rem; border-top: 0.5px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .footer-logo { font-family: var(--ff-display); font-size: 18px; color: var(--text-primary); text-decoration: none; }
    .footer-logo span { color: var(--accent); }
    .footer-links { display: flex; gap: 1.5rem; align-items: center; }
    .footer-link { font-size: 12px; color: var(--text-secondary); text-decoration: none; transition: color 0.15s; }
    .footer-link:hover { color: var(--accent); }
    .footer-note { font-size: 12px; color: var(--text-tertiary); }

    @media (max-width: 600px) {
      .hero { padding: 3rem 1.25rem 2rem; }
      .filter-section, .blog-section { padding-left: 1.25rem; padding-right: 1.25rem; }
      .nav-tag { display: none; }
      footer { padding: 1.5rem 1.25rem 2.5rem; }
    }
  </style>
</head>
<body>

<section class="hero">

<footer>
  <a class="footer-logo" href="index.html">Data<span>Lens</span></a>
  <div class="footer-links">

    <a class="footer-link" href="blog.html">Blog</a>
    <a class="footer-link" href="privacy.html">Privacy Policy</a>
    <a class="footer-link" href="https://www.linkedin.com/in/gyansharma695/" target="_blank">LinkedIn</a>
  </div>
  <div class="footer-note">Built by Gyanendu Sharma</div>
</footer>

<script>
const POSTS = [
  {
    tag: "Finance & AML", date: "May 2025",
    title: "How AML analysts use data to detect financial crime",
    excerpt: "A practical look at the data sources, models, and tools used in anti-money laundering investigations.",
    body: `<p>AML analysts rely on transaction monitoring systems that flag unusual patterns — large cash deposits, rapid fund movements, or transfers to high-risk jurisdictions. These rules-based systems produce enormous volumes of false positives, often flagging 95%+ of alerts as non-suspicious after manual review.</p>
    <h4>Where data analysis comes in</h4>
    <p>Graph analytics maps relationships between accounts to detect layering schemes where funds pass through multiple intermediaries to obscure their origin. Tools like Quantexa and ThetaRay build entity resolution models that link accounts, individuals, and businesses across disparate datasets.</p>
    <h4>Key tools & techniques</h4>
    <ul>
      <li>Transaction monitoring platforms: Actimize, Temenos Financial Crime Mitigation</li>
      <li>Graph databases (Neo4j) for network relationship mapping</li>
      <li>Machine learning to reduce false positives using historical SAR data</li>
      <li>NLP on news and sanctions databases for name matching</li>
    </ul>`
  },
  {
    tag: "Business Intelligence", date: "Apr 2025",
    title: "Power BI vs Tableau — which should a Business Analyst learn first?",
    excerpt: "A side-by-side comparison to help you decide where to invest your learning time.",
    body: `<h4>Choose Power BI if:</h4>
    <ul>
      <li>Your org runs on Microsoft 365, Azure, or Teams</li>
      <li>You're targeting banking, corporate finance, or operations roles</li>
      <li>Cost matters — Power BI is significantly cheaper at scale</li>
    </ul>
    <h4>Choose Tableau if:</h4>
    <ul>
      <li>You're targeting tech companies, consulting, or analyst roles</li>
      <li>You need advanced visual customization and flexibility</li>
    </ul>
    <p>If you can only learn one, start with Power BI — then add Tableau. The core concepts transfer quickly between both tools.</p>`
  },
  {
    tag: "SQL", date: "Mar 2025",
    title: "Top SQL queries every Business Analyst uses daily",
    excerpt: "The essential SQL patterns — from joins to window functions — that show up in real BA work every day.",
    body: `<h4>1. GROUP BY aggregations</h4>
    <p>The workhorse of analytics — summarizing transaction volumes, counts by category, or average values by segment.</p>
    <h4>2. LEFT JOIN</h4>
    <p>Essential for combining tables without dropping unmatched rows. Understanding join types separates good analysts from great ones.</p>
    <h4>3. CASE WHEN</h4>
    <p>For creating derived categories — bucketing loan amounts into tiers or flagging high-risk transactions.</p>
    <h4>4. Window functions (ROW_NUMBER, RANK, LAG)</h4>
    <p>Calculate rankings within groups, compare rows to previous rows, or identify first/last events per customer.</p>
    <h4>5. CTEs (WITH clauses)</h4>
    <p>Make complex multi-step queries readable and maintainable — used heavily in reporting and BI pipelines.</p>`
  },
  {
    tag: "Banking", date: "Feb 2025",
    title: "How banks use credit scoring models — a non-technical guide",
    excerpt: "What actually happens when a bank decides whether to approve your loan application.",
    body: `<p>Banks use a combination of bureau scores (FICO, VantageScore) and internally built scorecards. Bureau scores provide a standardized baseline, while internal models incorporate bank-specific data like account history and prior defaults.</p>
    <h4>Key factors in a credit score</h4>
    <ul>
      <li>Payment history (35%) — whether you pay on time</li>
      <li>Credit utilization (30%) — how much of your available credit you're using</li>
      <li>Length of credit history (15%) — age of your oldest and newest accounts</li>
      <li>Credit mix (10%) — variety of account types</li>
      <li>New credit inquiries (10%) — recent applications for new credit</li>
    </ul>
    <h4>Why banks use logistic regression, not deep learning</h4>
    <p>Under ECOA and Fair Lending regulations, banks must explain every credit denial. Black-box models can't provide this — logistic regression remains dominant because it's interpretable by regulators and auditors.</p>`
  },
  {
    tag: "Microsoft Fabric", date: "Jan 2025",
    title: "What is Microsoft Fabric and why it matters for BI analysts",
    excerpt: "Microsoft's new unified data platform and what it means for your day-to-day analytics work.",
    body: `<p>Microsoft Fabric unifies data engineering, data warehousing, real-time analytics, data science, and Power BI into a single SaaS platform. The biggest shift is <strong>OneLake</strong> — a unified storage layer all Fabric workloads share, eliminating data silos between teams.</p>
    <h4>Direct Lake mode</h4>
    <p>Power BI's new Direct Lake connection queries data directly from OneLake Delta tables without importing it — enabling near-real-time reporting at scale.</p>
    <h4>Should you learn it now?</h4>
    <ul>
      <li>If your org is on Azure and Power BI Premium — yes, start now</li>
      <li>Microsoft Fabric certifications (DP-600) are already appearing in job postings</li>
      <li>If you're in a Snowflake or Databricks shop — monitor but don't prioritize yet</li>
    </ul>`
  },
  {
    tag: "Operations Analytics", date: "Dec 2024",
    title: "How operations analytics drives efficiency in banking",
    excerpt: "How process mining, KPIs, and dashboards improve banking operations.",
    body: `<p>Operations analytics in banking focuses on reducing processing time, error rates, and cost-per-transaction across loan origination, KYC onboarding, and payment processing.</p>
    <h4>Process mining</h4>
    <p>Tools like Celonis extract event logs from core banking systems and reconstruct actual workflows — revealing bottlenecks and non-compliant process variants invisible to traditional analysis.</p>
    <h4>Key operational KPIs in banking</h4>
    <ul>
      <li>STP rate — % of transactions processed without manual intervention</li>
      <li>Average handling time (AHT) — time to complete a process step end-to-end</li>
      <li>Error rate — % of transactions requiring rework</li>
      <li>Cost per transaction — total operational cost divided by volume</li>
    </ul>`
  },
  {
    tag: "Career", date: "Nov 2024",
    title: "From Business Analyst to Data Analyst — what skills do you need?",
    excerpt: "A practical roadmap for BAs who want to transition into more data-heavy roles.",
    body: `<h4>Skills you already have</h4>
    <ul>
      <li>Business domain knowledge — understanding what metrics matter and why</li>
      <li>Stakeholder communication — translating findings into business language</li>
      <li>Requirements gathering — knowing what questions to ask of data</li>
    </ul>
    <h4>Skills to build</h4>
    <ul>
      <li><strong>SQL (priority #1)</strong> — intermediate SQL: joins, window functions, CTEs</li>
      <li><strong>Python basics</strong> — pandas for data manipulation, matplotlib for charting</li>
      <li><strong>Statistics fundamentals</strong> — distributions, hypothesis testing, regression</li>
      <li><strong>Advanced Power BI / Tableau</strong> — calculated fields, custom measures</li>
    </ul>
    <p>With 10–15 hours/week of deliberate practice, most BAs can build a competitive portfolio in 6–9 months. Your domain knowledge is your differentiator.</p>`
  },
  {
    tag: "Data Strategy", date: "Oct 2024",
    title: "What is a data-driven organization — and how do you build one?",
    excerpt: "The cultural and technical elements that separate truly data-driven companies from those that just have dashboards.",
    body: `<h4>Cultural hallmarks</h4>
    <ul>
      <li>Decisions are challenged with data, not just intuition — even by senior leaders</li>
      <li>Data literacy is expected across functions, not just in the analytics team</li>
      <li>Business teams can self-serve on data without always needing analyst support</li>
    </ul>
    <h4>Technical foundations</h4>
    <ul>
      <li>A single source of truth — one data warehouse all teams pull from</li>
      <li>Defined metrics and KPIs consistently calculated across teams</li>
      <li>Data quality processes — automated testing and lineage tracking</li>
    </ul>
    <h4>The most common failure mode</h4>
    <p>Organizations invest heavily in tooling but neglect governance and literacy. The result: multiple "single sources of truth" that contradict each other, and leadership reverting to gut instinct because they don't trust the numbers.</p>`
  },
  {
    tag: "Healthcare Analytics", date: "Sep 2024",
    title: "How hospitals use data to reduce patient readmissions",
    excerpt: "The predictive models and operational strategies hospitals use to keep patients from returning within 30 days.",
    body: `<p>Under CMS's Hospital Readmissions Reduction Program (HRRP), hospitals face financial penalties for excessive readmissions — making readmission prediction a high-priority analytics use case.</p>
    <h4>What data is used</h4>
    <ul>
      <li>EHR data — diagnosis codes, comorbidities, medication lists, vital signs</li>
      <li>Social determinants of health — housing stability, transportation access</li>
      <li>Prior utilization — number of ED visits and hospitalizations in the past 12 months</li>
    </ul>
    <p>Logistic regression and gradient boosted trees (XGBoost, LightGBM) are most widely used in production. The model is only half the solution — high-risk patients need structured follow-up at discharge to actually reduce readmissions.</p>`
  },
];

// Build filter tags
const allTags = ['All', ...new Set(POSTS.map(p => p.tag))];
const filterWrap = document.getElementById('filter-wrap');
let activeTag = 'All';

allTags.forEach(tag => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (tag === 'All' ? ' active' : '');
  btn.textContent = tag;
  btn.addEventListener('click', () => {
    activeTag = tag;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.post-card').forEach(card => {
      const cardTag = card.dataset.tag;
      card.classList.toggle('hidden', tag !== 'All' && cardTag !== tag);
    });
  });
  filterWrap.appendChild(btn);
});

// Render posts
const grid = document.getElementById('blog-grid');
POSTS.forEach((post, i) => {
  const bodyId = 'body-' + i;
  const card = document.createElement('article');
  card.className = 'post-card';
  card.dataset.tag = post.tag;
  card.innerHTML = `
    <div class="post-meta">
      <span class="post-tag">${post.tag}</span>
      <span class="post-date">${post.date}</span>
    </div>
    <div class="post-title">${post.title}</div>
    <div class="post-excerpt">${post.excerpt}</div>
    <div class="post-body" id="${bodyId}">${post.body}</div>
    <span class="read-more" id="lbl-${i}">Read more ↓</span>
  `;
  card.addEventListener('click', () => {
    const body = document.getElementById(bodyId);
    const lbl = document.getElementById('lbl-' + i);
    const isOpen = body.classList.contains('visible');
    body.classList.toggle('visible', !isOpen);
    card.classList.toggle('open', !isOpen);
    lbl.textContent = isOpen ? 'Read more ↓' : 'Close ↑';
  });
  grid.appendChild(card);
});
</script>
</body>
</html>
